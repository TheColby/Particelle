# Particelle patch — generated by `particelle init -n 2`
# Edit this file to configure your grain clouds.
# Documentation: https://github.com/TheColby/Particelle

engine:
  sample_rate: 48000
  block_size: 256

layout:
  channels:
    - { name: "L", azimuth_deg: -30.0, elevation_deg: 0.0 }
    - { name: "R", azimuth_deg:  30.0, elevation_deg: 0.0 }

tuning:
  mode: twelve_tet

clouds:
  - id: my_cloud
    source: "audio/music_example.wav"
    density: 16.0
    duration: 0.1
    amplitude: 0.5
    position: 0.5
    window:
      type: hann
    listener_pos: { x: 0.0, y: 1.0, z: 0.0 }
    width: 0.5
