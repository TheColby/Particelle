[package]
name    = "particelle-midi"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[features]
default  = []
realtime = ["dep:midir", "dep:ringbuf"]

[dependencies]
particelle-params.workspace  = true
particelle-tuning.workspace  = true
