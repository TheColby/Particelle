serde.workspace     = true
thiserror.workspace = true
midir   = { version = "0.10", optional = true }
ringbuf = { version = "0.4",  optional = true }

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "routing_bench"
harness = false
