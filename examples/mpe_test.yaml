engine:
  sample_rate: 48000
  block_size: 256

layout:
  channels:
    - { name: "L", azimuth_deg: -30.0 }
    - { name: "R", azimuth_deg:  30.0 }

routing:
  midi_bindings:
    - source: mpe.pressure
      target: pressure_mod

clouds:
  - id: mpe_shimmer
    source: audio/music_example.wav
    density:
      op: add
      args:
        - 5.0
        - op: mul
          args:
            - 10.0
            - $pressure_mod
    duration: 0.1
    amplitude: 0.8
    position: 0.0
    listener_pos: { x: 0.0, y: 1.0, z: 0.0 }
    width: 0.3
    window: { type: hann }
