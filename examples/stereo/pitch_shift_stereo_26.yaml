# Pitch Shift Stereo 26
# A pitch shift granular patch designed for stereo output. Uses JI tuning to shift intervals.
engine:
  sample_rate: 48000
  block_size: 256

layout:
  channels:
    - type: spherical
      name: L
      azimuth_deg: -30.0
      elevation_deg: 0.0
    - type: spherical
      name: R
      azimuth_deg: 30.0
      elevation_deg: 0.0

tuning:
  mode: ji
  ratios:
    - degree: 1
      num: 3
      den: 2

clouds:
  - id: "pitch_shift_stereo_26"
    source: "audio/music_example.wav"
    density: 69.0
    duration: 0.134
    position: 0.13
    amplitude: 0.8
    width: 0.5
    window: { type: hann }
    listener_pos: { x: 0.0, y: 1.0, z: 0.0 }
