# Time Stretch Stereo 21
# A time stretch granular patch designed for stereo output. Uses a slow position sweep.
engine:
  sample_rate: 48000
  block_size: 256

layout:
  channels:
    - type: spherical
      name: L
      azimuth_deg: -30.0
      elevation_deg: 0.0
    - type: spherical
      name: R
      azimuth_deg: 30.0
      elevation_deg: 0.0

clouds:
  - id: "time_stretch_stereo_21"
    source: "audio/music_example.wav"
    density: 108.3
    duration: 0.167
    position: 
      op: curve
      ref: "curves/sweep_up.json"
    amplitude: 0.8
    width: 0.5
    window: { type: hann }
    listener_pos: { x: 0.0, y: 1.0, z: 0.0 }
