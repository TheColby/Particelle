# Glitch Mono 32
# A glitch granular patch designed for mono output.
engine:
  sample_rate: 48000
  block_size: 256

layout:
  channels:
    - type: spherical
      name: M
      azimuth_deg: 0.0
      elevation_deg: 0.0

clouds:
  - id: "glitch_mono_32"
    source: "audio/music_example.wav"
    density: 23.9
    duration: 0.138
    position: 0.17
    amplitude: 0.8
    width: 0.5
    window: { type: hann }
    listener_pos: { x: 0.0, y: 1.0, z: 0.0 }
