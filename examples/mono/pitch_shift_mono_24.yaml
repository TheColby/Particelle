# Pitch Shift Mono 24
# A pitch shift granular patch designed for mono output. Uses JI tuning to shift intervals.
engine:
  sample_rate: 48000
  block_size: 256

layout:
  channels:
    - type: spherical
      name: M
      azimuth_deg: 0.0
      elevation_deg: 0.0

tuning:
  mode: ji
  ratios:
    - degree: 1
      num: 3
      den: 2

clouds:
  - id: "pitch_shift_mono_24"
    source: "audio/music_example.wav"
    density: 144.9
    duration: 0.114
    position: 0.29
    amplitude: 0.8
    width: 0.5
    window: { type: hann }
    listener_pos: { x: 0.0, y: 1.0, z: 0.0 }
