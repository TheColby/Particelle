# MPE Mono 14
# A mpe granular patch designed for mono output. Reacts to MIDI pressure.
engine:
  sample_rate: 48000
  block_size: 256

layout:
  channels:
    - type: spherical
      name: M
      azimuth_deg: 0.0
      elevation_deg: 0.0

routing:
  midi_bindings:
    - source: mpe.pressure
      target: p_mod

clouds:
  - id: "mpe_mono_14"
    source: "audio/music_example.wav"
    density:
      op: add
      args:
        - 15.0
        - op: mul
          args:
            - 135.0
            - $p_mod

    duration: 0.035
    position: 0.09
    amplitude: 0.8
    width: 0.5
    window: { type: hann }
    listener_pos: { x: 0.0, y: 1.0, z: 0.0 }
