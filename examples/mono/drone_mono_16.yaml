# Drone Mono 16
# A drone granular patch designed for mono output.
engine:
  sample_rate: 48000
  block_size: 256

layout:
  channels:
    - type: spherical
      name: M
      azimuth_deg: 0.0
      elevation_deg: 0.0

clouds:
  - id: "drone_mono_16"
    source: "audio/music_example.wav"
    density: 15.0
    duration: 0.5
    position: 0.15
    amplitude: 0.8
    width: 0.5
    window: { type: tukey, alpha: 0.5 }
    listener_pos: { x: 0.0, y: 1.0, z: 0.0 }
