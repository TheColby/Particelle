name: Nightly

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux audio build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Build release binary
        run: cargo build --release -p particelle-cli --target ${{ matrix.target }}

      - name: Package nightly artifact
        run: |
          ./scripts/package_release.sh \
            --target "${{ matrix.target }}" \
            --version "nightly" \
            --binary "target/${{ matrix.target }}/release/particelle" \
            --out-dir dist

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.target }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download nightly artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-*
          path: dist
          merge-multiple: true

      - name: Consolidate checksums
        shell: bash
        run: cat dist/*.sha256 > dist/SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign nightly payloads
        shell: bash
        run: |
          for artifact in dist/*.tar.gz dist/SHA256SUMS; do
            cosign sign-blob --yes \
              --output-signature "${artifact}.sig" \
              --output-certificate "${artifact}.pem" \
              "$artifact"
          done

      - name: Publish/refresh nightly release
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Particelle Nightly
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          artifacts: >-
            dist/*.tar.gz,
            dist/*.sha256,
            dist/SHA256SUMS,
            dist/*.tar.gz.sig,
            dist/*.tar.gz.pem,
            dist/SHA256SUMS.sig,
            dist/SHA256SUMS.pem
          body: |
            Automated nightly build from `${{ github.sha }}`.
